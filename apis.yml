aid: jumia
name: Jumia
description: >-
  Jumia is a pan-African e-commerce company often described as the "Amazon of
  Africa." Headquartered in Berlin and listed on the New York Stock Exchange
  under the ticker JMIA since its 2019 IPO, Jumia Technologies AG operates a
  third-party marketplace, a logistics network (Jumia Logistics), and a digital
  payments arm (JumiaPay) across eight African markets as of 2026: Egypt,
  Ghana, Ivory Coast, Kenya, Morocco, Nigeria, Senegal, and Uganda. The company
  exited Algeria in February 2026 and previously wound down Cameroon, Gabon,
  Rwanda, and Tunisia as part of a multi-year restructuring program targeting
  full-year profitability in 2027. Jumia's commerce platform connects more than
  100,000 sellers with consumers across diverse categories including phones and
  electronics, fashion, home and living, beauty, FMCG, and groceries. Its
  developer surface is non-trivial: the Jumia Vendor API (vendor center,
  OAuth 2.0) supports order, inventory, product, and shipment integration for
  marketplace sellers, while the legacy SellerCenter API (a SellerCenter /
  Rocket Internet lineage shared with Lazada and Daraz) remains documented
  with PHP, Python, Ruby, and Node SDKs. JumiaPay exposes a Merchant API for
  payment creation, verification, refund, recurring-payment agreements, and
  callback-based webhooks, plus official WooCommerce and Magento payment-gateway
  plugins. The Jumia GitHub organization is sparse (an open-source playbook,
  Jumia Tech Blog, and Tech in Porto event site) while the JumiaPay AIG GitHub
  org hosts the WooCommerce and Magento gateway plugins under Apache 2.0.
